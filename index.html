<head>
    <meta charset="UTF-8">
    <title>Love</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffdde1, #ee9ca7);
            overflow: hidden;
            text-align: center;
        }

        h1 {
            color: white;
            font-size: 42px;
            max-width: 900px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.25);
            margin-bottom: 40px;
        }

        .images {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        img {
            width: 280px;
            height: 360px;
            object-fit: cover;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: coolSpin 6s linear infinite, float 3s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        img:nth-child(2) {
            animation-delay: 0.8s;
        }

        img:hover {
            animation-play-state: paused;
            transform: scale(1.08);
        }

        @keyframes coolSpin {
            0% {
                rotate: 0deg;
            }
            100% {
                rotate: 360deg;
            }
        }

        @keyframes float {
            0%, 100% {
                translate: 0 0;
            }
            50% {
                translate: 0 -20px;
            }
        }
    </style>
</head>

<body>
    <h1>World's prettiest girl and the love of my life with the prettiest smile</h1>

    <div class="images">
        <img src="img/IMG_6024.JPEG" alt="">
        <img src="img/IMG_4773.JPEG" alt="">
    </div>
</body>
</html>
