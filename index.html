<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Love </title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(
        135deg,
        #ff9a9e,
        #fad0c4,
        #fad0c4,
        #ffdde1
    );
    overflow:hidden;
    text-align:center;
}

/* Naviagaation */

nav{
    position:fixed;
    top:20px;
    left:20px;
    z-index:9999;
}

.dropdown{
    position:relative;
}

.dropdown button{
    border:none;
    padding:15px 25px;
    border-radius:20px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;

    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(15px);

    color:white;

    box-shadow:
        0 8px 25px rgba(0,0,0,0.2);

    transition:0.3s;
}

.dropdown button:hover{
    transform:translateY(-3px);
}

.dropdown-content{
    position:absolute;
    top:60px;
    left:0;

    display:none;
    min-width:220px;

    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);

    border-radius:20px;

    overflow:hidden;

    box-shadow:
        0 8px 25px rgba(0,0,0,0.2);
}

.dropdown-content a{
    display:block;
    padding:15px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.dropdown-content a:hover{
    background:rgba(255,255,255,0.15);
}

.dropdown:hover .dropdown-content{
    display:block;
}

/* Titel */

h1{
    color:white;
    font-size:55px;
    max-width:1100px;
    margin-bottom:50px;

    text-shadow:
        0 5px 20px rgba(0,0,0,0.25);

    animation:floatText 3s ease-in-out infinite;
}

@keyframes floatText{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

/* Bilder */

.images{
    display:flex;
    gap:60px;
    flex-wrap:wrap;
    justify-content:center;
}

.images img{
    width:320px;
    height:420px;
    object-fit:cover;

    border-radius:35px;

    border:4px solid rgba(255,255,255,0.4);

    box-shadow:
        0 20px 40px rgba(0,0,0,0.25);

    animation:
        spin 10s linear infinite,
        float 4s ease-in-out infinite;

    transition:0.4s;
}

.images img:hover{
    animation-play-state:paused;
    transform:scale(1.1);
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@keyframes float{
    0%,100%{
        translate:0 0;
    }
    50%{
        translate:0 -20px;
    }
}

/* Herazen */

.heart{
    position:absolute;
    color:white;
    opacity:0.3;
    animation:hearts 10s linear infinite;
    pointer-events:none;
}

@keyframes hearts{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120vh);
    }
}

</style>
</head>

<body>

<nav>
    <div class="dropdown">
        <button>🌍 Travel Vlogs ▼</button>

        <div class="dropdown-content">
            <a href="italien.html">🇮🇹 Italien Vlog</a>
            <a href="griechenland.html">🇬🇷 Griechenland Vlog</a>
        </div>
    </div>
</nav>

<h1>
     World's Prettiest Girl and the Love of my Life with the Prettiest Smile 
</h1>

<div class="images">
    <img src="img/IMG_6024.JPEG" alt="">
    <img src="img/IMG_4773.JPEG" alt="">
</div>

<!-- Herzen -->
<div class="heart" style="left:5%;font-size:40px;">❤️</div>
<div class="heart" style="left:15%;font-size:25px;animation-delay:1s;">❤️</div>
<div class="heart" style="left:30%;font-size:50px;animation-delay:3s;">❤️</div>
<div class="heart" style="left:50%;font-size:30px;animation-delay:2s;">❤️</div>
<div class="heart" style="left:70%;font-size:45px;animation-delay:5s;">❤️</div>
<div class="heart" style="left:90%;font-size:35px;animation-delay:4s;">❤️</div>

</body>
</html>
